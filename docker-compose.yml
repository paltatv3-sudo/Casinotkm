version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: casinotkm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: casinotkm
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5000
      JWT_SECRET: your_jwt_secret_key_here
      STRIPE_SECRET_KEY: sk_test_your_key
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
